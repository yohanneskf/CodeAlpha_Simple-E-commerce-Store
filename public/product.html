<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - EliteStore</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .details-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-top: 3rem;
        }
        .details-image img {
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .details-content h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .details-price {
            font-size: 2rem;
            color: var(--secondary-color);
            font-weight: 700;
            margin-bottom: 2rem;
        }
        .details-description {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            .details-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">ELITE<span>STORE</span></a>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/cart.html">Cart</a></li>
                <li><a href="/login.html" id="auth-link">Login</a></li>
            </ul>
        </nav>
        <div class="cart-icon" onclick="location.href='/cart.html'">
            <i class="fas fa-shopping-cart fa-lg"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <main id="product-details">
        <!-- Details will be loaded here -->
        <p>Loading product details...</p>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadProductDetails() {
            if (!productId) {
                document.getElementById('product-details').innerHTML = '<h1>Product not found</h1>';
                return;
            }

            try {
                const product = await api.get(`/products/${productId}`);
                if (product.message) throw new Error(product.message);

                document.getElementById('product-details').innerHTML = `
                    <div class="details-container">
                        <div class="details-image">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <div class="details-content">
                            <h1>${product.name}</h1>
                            <div class="details-price">${product.price} ETB</div>
                            <p class="details-description">${product.description || 'No description available.'}</p>
                            <div class="form-group" style="max-width: 150px;">
                                <label>Quantity</label>
                                <input type="number" id="qty" value="1" min="1">
                            </div>
                            <button class="btn btn-primary" style="padding: 1rem 3rem; margin-top: 1rem;" onclick="addMultipleToCart('${product.id}', '${product.name}', ${product.price}, '${product.image}')">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('product-details').innerHTML = '<h1>Error loading product</h1>';
            }
        }

        function addMultipleToCart(id, name, price, image) {
            const qty = parseInt(document.getElementById('qty').value) || 1;
            for(let i=0; i < qty; i++) {
                addToCart(id, name, price, image);
            }
        }

        loadProductDetails();
    </script>
</body>
</html>
