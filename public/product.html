<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabeshaMart - Product Details</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container header-inner">
            <a href="/" class="logo">HabeshaMart</a>
            <nav class="nav-links">
                <a href="/">Home</a>
                <a href="/shop.html">Categories</a>
            </nav>
            <div class="header-actions">
                <div class="cart-icon" onclick="location.href='/cart.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Breadcrumbs -->
        <nav class="breadcrumbs" style="margin-top: 32px; margin-bottom: 24px;">
            <a href="/" class="label-sm">Home</a>
            <i class="fas fa-chevron-right" style="font-size: 8px; margin: 0 8px;"></i>
            <a href="/shop.html" class="label-sm">Heritage Collection</a>
            <i class="fas fa-chevron-right" style="font-size: 8px; margin: 0 8px;"></i>
            <span class="label-sm" id="breadcrumb-name" style="color: var(--on-surface);">Product Details</span>
        </nav>

        <div id="product-details-view">
            <!-- Dynamic Content -->
            <div class="loader">Unveiling heritage...</div>
        </div>

        <!-- Complete the Experience -->
        <section class="upsell-section" style="margin-top: 80px; margin-bottom: 80px;">
            <div class="section-header">
                <h2 class="headline-md">Complete the Experience</h2>
                <a href="/shop.html" class="label-md">View Entire Collection</a>
            </div>
            <div class="product-grid" id="upsell-grid">
                <!-- Related products will go here -->
            </div>
        </section>
    </main>

    <!-- Footer same as index -->
    <footer class="desktop-footer">
        <div class="container footer-bottom" style="border: none; padding-top: 0;">
            <p>&copy; 2026 HabeshaMart. Heritage Modernism in Commerce.</p>
        </div>
    </footer>

    <!-- Mobile Tab Bar same as index -->
    <nav class="mobile-tab-bar">
        <a href="/" class="tab-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/shop.html" class="tab-item">
            <i class="fas fa-th-large"></i>
            <span>Categories</span>
        </a>
        <a href="/cart.html" class="tab-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
        </a>
        <a href="/profile.html" class="tab-item">
            <i class="far fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadProductDetails() {
            const display = document.getElementById('product-details-view');
            if (!productId) {
                display.innerHTML = '<h1 class="headline-md">Heritage not found</h1>';
                return;
            }

            try {
                const product = await api.get(`/products/${productId}`);
                document.title = `${product.name} - HabeshaMart`;
                document.getElementById('breadcrumb-name').textContent = product.name;

                display.innerHTML = `
                    <div class="details-layout">
                        <div class="gallery-side">
                            <div class="main-image">
                                <img src="${product.image}" alt="${product.name}">
                                <button class="wishlist-btn"><i class="far fa-heart"></i></button>
                            </div>
                            <div class="thumbnail-grid">
                                <img src="${product.image}" class="thumb active">
                                <img src="https://images.unsplash.com/photo-1594494024039-df071d64388e?w=200&q=80" class="thumb">
                                <img src="https://images.unsplash.com/photo-1578326457399-3b34dbbf23b8?w=200&q=80" class="thumb">
                                <button class="thumb more-thumb">+2</button>
                            </div>
                        </div>
                        <div class="content-side">
                            <span class="product-badge badge-bestseller">Premium Heritage</span>
                            <div class="rating-row" style="margin: 12px 0;">
                                <div class="stars">
                                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                                </div>
                                <span class="label-sm">(${product.reviews || 0} Reviews)</span>
                            </div>
                            <h1 class="display-lg" style="margin-bottom: 12px;">${product.name}</h1>
                            <p class="headline-md" style="color: var(--primary); margin-bottom: 32px;">${product.price.toLocaleString()} ETB</p>
                            
                            <div class="options-box">
                                <p class="label-md" style="margin-bottom: 12px;">Selection Options</p>
                                <div class="option-chips">
                                    <button class="option-chip active"></button>
                                    <button class="option-chip" style="background-color: #D4AF37;"></button>
                                    <button class="option-chip" style="background-color: #E5E5E5;"></button>
                                </div>
                            </div>

                            <div class="action-row" style="margin-top: 32px;">
                                <div class="qty-selector" style="height: 56px; width: 140px;">
                                    <button class="qty-btn" onclick="const i = document.getElementById('details-qty'); i.value = Math.max(1, i.value-1)">-</button>
                                    <input type="number" id="details-qty" value="1" class="qty-input">
                                    <button class="qty-btn" onclick="const i = document.getElementById('details-qty'); i.value = Number(i.value)+1">+</button>
                                </div>
                                <button class="btn btn-primary" style="flex: 1; height: 56px;" onclick="addFromDetails('${product.id}', '${product.name}', ${product.price}, '${product.image}')">
                                    <i class="fas fa-shopping-bag"></i> Add to Cart
                                </button>
                            </div>
                            
                            <button class="btn btn-secondary" style="width: 100%; margin-top: 16px; height: 56px; border-color: var(--outline-variant); color: var(--on-surface);">
                                Buy with CBE Birr / Chapa
                            </button>

                            <div class="trust-indicators" style="margin-top: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                                <div class="trust-item">
                                    <i class="fas fa-truck" style="color: var(--primary);"></i>
                                    <span class="label-sm">Express Delivery <br> (2-3 Business Days)</span>
                                </div>
                                <div class="trust-item">
                                    <i class="fas fa-shield-alt" style="color: var(--primary);"></i>
                                    <span class="label-sm">Secure Payments <br> (End-to-End Encrypted)</span>
                                </div>
                            </div>

                            <div class="tabs-control" style="margin-top: 40px;">
                                <div class="tabs-header">
                                    <button class="tab-btn active">Description</button>
                                    <button class="tab-btn">Specifications</button>
                                    <button class="tab-btn">Care Guide</button>
                                </div>
                                <div class="tab-content body-md" style="margin-top: 24px; color: var(--on-surface-variant);">
                                    ${product.description}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (err) {
                display.innerHTML = '<h1 class="headline-md">Error loading heritage details</h1>';
            }
        }

        function addFromDetails(id, name, price, image) {
            const qty = parseInt(document.getElementById('details-qty').value) || 1;
            for(let i=0; i<qty; i++) addToCart(id, name, price, image);
            alert(`${qty} items added to your cart.`);
        }

        loadProductDetails();
    </script>
</body>
</html>
