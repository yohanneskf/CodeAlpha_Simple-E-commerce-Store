<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HabeshaMart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--surface-container-low);">
    <header>
      <div class="container header-inner">
        <a href="index.html" class="logo">HabeshaMart</a>

        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="shop.html">Categories</a>
        </nav>

        <div class="search-bar center-search">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Search for Heritage Products, Jebenas, or Kemis..." />
        </div>

        <div class="header-actions">
          <div class="lang-toggle">
            <i class="fas fa-globe"></i>
            <span>EN</span>
          </div>
          <a href="wishlist.html" class="header-action-item">
            <i class="far fa-heart"></i>
            <span id="wishlist-count">0</span>
          </a>
          <a href="login.html" class="header-action-item" id="auth-link-btn">
            <i class="far fa-user"></i>
            <span>Account</span>
          </a>
          <div class="cart-icon" onclick="location.href='cart.html'">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
        <div class="auth-card" style="max-width: 440px; margin: 80px auto; background: white; padding: 40px; border-radius: var(--radius-lg); border: 1px solid var(--surface-container-highest); box-shadow: var(--shadow-soft);">
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 class="headline-md">Welcome Back</h1>
                <p class="body-md" style="color: var(--on-surface-variant);">Access your Heritage Collection and track orders.</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="input-field" required placeholder="e.g. bekele@example.com">
                </div>
                <div class="form-group" style="margin-bottom: 8px;">
                    <label>Password</label>
                    <input type="password" id="password" class="input-field" required placeholder="••••••••">
                </div>
                <div style="text-align: right; margin-bottom: 24px;">
                    <a href="#" class="label-sm" style="color: var(--primary);">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; height: 56px;">
                    Sign In
                </button>
            </form>

            <div style="margin: 32px 0; display: flex; align-items: center; gap: 16px;">
                <hr style="flex: 1; border: 0; border-top: 1px solid var(--outline-variant);">
                <span class="label-sm" style="color: var(--on-surface-variant);">OR</span>
                <hr style="flex: 1; border: 0; border-top: 1px solid var(--outline-variant);">
            </div>

            <div style="text-align: center;">
                <p class="body-md">New to HabeshaMart? <a href="register.html" style="color: var(--primary); font-weight: 600;">Explore Membership</a></p>
            </div>
        </div>
    </main>

    <footer class="desktop-footer" style="background: none; border: none; margin-top: 0;">
        <div class="container footer-bottom" style="border: none; justify-content: center;">
            <p>&copy; 2026 HabeshaMart. Authentic Heritage in Every Click.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await api.post('/auth/login', { email, password });
                if (response.token) {
                    api.setToken(response.token);
                    localStorage.setItem('user', JSON.stringify(response.user));
                    window.location.href = '/';
                } else {
                    alert(response.message || 'Login failed. Please check your credentials.');
                }
            } catch (err) {
                alert('An error occurred during login. Please try again.');
            }
        });
    </script>
</body>
</html>
