<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EliteStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">ELITE<span>STORE</span></a>
    </header>

    <main>
        <div class="auth-container">
            <h2>Join EliteStore</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="Name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Register</button>
            </form>
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
                Already have an account? <a href="/login.html" style="color: var(--primary-color);">Login</a>
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await api.post('/auth/register', { username, email, password });
                if (response.token) {
                    api.setToken(response.token);
                    localStorage.setItem('user', JSON.stringify(response.user));
                    window.location.href = '/';
                } else {
                    alert(response.message || 'Registration failed');
                }
            } catch (err) {
                alert('An error occurred during registration');
            }
        });
    </script>
</body>
</html>
